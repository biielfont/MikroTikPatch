name: Patch Mikrotik RouterOS 7.x

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Versión específica de RouterOS (ej: 7.15.1). Si se deja vacío, usa la última"
        required: false
        default: ""
      arch:
        description: "Arquitectura(s) a compilar (separadas por coma). Dejar vacío = todas"
        required: false
        default: ""
      channel:
        description: "Canal a usar"
        type: choice
        required: true
        default: stable
        options:
          - stable
          - testing

permissions:
  contents: write

env:
  MIKRO_NPK_SIGN_PUBLIC_LKEY: C293CED638A2A33C681FC8DE98EE26C54EADC5390C2DFCE197D35C83C416CF59
  MIKRO_LICENSE_PUBLIC_KEY: 8E1067E4305FCDC0CFBF95C10F96E5DFE8C49AEF486BD1A4E2E96C27F01E3E32
  CUSTOM_NPK_SIGN_PRIVATE_KEY: 83E27544460D74AE42D09F4525B8F126CD731290CD13FCC37666CCEFF40CB1A0
  CUSTOM_NPK_SIGN_PUBLIC_KEY: 0A6BF5AF239F3F74E23191FA230753AE4B40F83AD26439F5C790A5182BB574E4
  CUSTOM_LICENSE_PRIVATE_KEY: 2C884A41C5EC08D898522D8D7D6912ED207D45ECADFF5BF765A5916F69E0A301
  CUSTOM_LICENSE_PUBLIC_KEY: F6835D26B20EA0D802192B242845F24B5CB095AEA3A175B6B34EF16CF3AF2B46

jobs:

  # -----------------------------
  # Genera la matriz dinámica
  # -----------------------------
  Build_Matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix_include: ${{ steps.set_matrix.outputs.matrix_include }}
    steps:
      - id: set_matrix
        run: |
          if [ -z "${{ github.event.inputs.arch }}" ]; then
            ARCH_LIST=("x86" "arm64" "arm" "mmips" "mipsbe" "smips" "tile" "ppc")
          else
            IFS=',' read -ra ARCH_LIST <<< "${{ github.event.inputs.arch }}"
          fi

          MATRIX_JSON="["
          for A in "${ARCH_LIST[@]}"; do
            MATRIX_JSON+="{\"arch\":\"$A\",\"channel\":\"${{ github.event.inputs.channel }}\"},"
          done
          MATRIX_JSON="${MATRIX_JSON%,}]"
          echo "matrix_include=$MATRIX_JSON" >> $GITHUB_OUTPUT

  # -----------------------------
  # Tiempo de build
  # -----------------------------
  Set_BuildTime:
    runs-on: ubuntu-22.04
    outputs:
      BUILD_TIME: ${{ steps.set_buildtime.outputs.BUILD_TIME }}
    steps:
      - name: Set build time
        id: set_buildtime
        run: echo "BUILD_TIME=$(date +'%s')" >> $GITHUB_OUTPUT

  # -----------------------------
  # Patching job principal
  # -----------------------------
  Patch_RouterOS:
    needs:
      - Build_Matrix
      - Set_BuildTime
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include: ${{ fromJson(needs.Build_Matrix.outputs.matrix_include) }}

    env:
      TZ: 'Asia/Jakarta'
      REQUESTED_VERSION: ${{ github.event.inputs.version }}
      LATEST_VERSION: ""
      ARCH: ""

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine version (requested or latest)
        id: determine_version
        run: |
          if [ -z "${{ env.REQUESTED_VERSION }}" ]; then
            LATEST=$(wget -nv -O - https://upgrade.mikrotik.com/routeros/NEWESTa7.${{ matrix.channel }} | cut -d ' ' -f1)
            echo "LATEST_VERSION=$LATEST" >> $GITHUB_ENV
            echo "Using latest version: $LATEST"
          else
            echo "LATEST_VERSION=${{ env.REQUESTED_VERSION }}" >> $GITHUB_ENV
            echo "Using requested version: ${{ env.REQUESTED_VERSION }}"
          fi

          # Convert architecture name to suffix
          case "${{ matrix.arch }}" in
            x86)    echo "ARCH=" >> $GITHUB_ENV ;;
            arm64)  echo "ARCH=-arm64" >> $GITHUB_ENV ;;
            arm)    echo "ARCH=-arm" >> $GITHUB_ENV ;;
            mmips)  echo "ARCH=-mmips" >> $GITHUB_ENV ;;
            mipsbe) echo "ARCH=-mipsbe" >> $GITHUB_ENV ;;
            smips)  echo "ARCH=-smips" >> $GITHUB_ENV ;;
            tile)   echo "ARCH=-tile" >> $GITHUB_ENV ;;
            ppc)    echo "ARCH=-ppc" >> $GITHUB_ENV ;;
          esac

          echo "BUILD_TIME=${{ needs.Set_BuildTime.outputs.BUILD_TIME }}" >> $GITHUB_ENV

      - name: Get CHANGELOG
        run: |
          wget -nv -O CHANGELOG https://upgrade.mikrotik.com/routeros/${{ env.LATEST_VERSION }}/CHANGELOG
          cat CHANGELOG

      # ---------------------------
      # CACHES
      # ---------------------------
      - name: Cache Squashfs
        id: cache-squashfs
        uses: actions/cache@v4
        with:
          path: |
            python3.sfs
            option.sfs
          key: busybox-python3-squashfs-${{ matrix.arch }}

      - name: Cache NetInstall
        id: cache-netinstall
        uses: actions/cache@v4
        with:
          path: netinstall.zip
          key: netinstall-${{ env.LATEST_VERSION }}

      # ---------------------------
      # NETINSTALL
      # ---------------------------
      - name: Download netinstall
        if: steps.cache-netinstall.outputs.cache-hit != 'true'
        run: sudo wget -nv -O netinstall.zip https://download.mikrotik.com/routeros/${{ env.LATEST_VERSION }}/netinstall-${{ env.LATEST_VERSION }}.zip

      - name: Patch netinstall
        run: |
          sudo unzip -o netinstall.zip
          sudo -E python3 patch.py netinstall netinstall.exe
          sudo zip netinstall-${{ env.LATEST_VERSION }}.zip netinstall.exe

      # ---------------------------
      # MIKROTIK FIRMWARE
      # ---------------------------
      - name: Cache firmware
        id: cache-mikrotik
        uses: actions/cache@v4
        with:
          path: |
            mikrotik.iso
            routeros.zip
            routeros.npk
          key: mikrotik-${{ env.LATEST_VERSION }}-${{ matrix.arch }}

      - name: Download firmware
        if: steps.cache-mikrotik.outputs.cache-hit != 'true'
        run: |
          if [ "${{ matrix.arch }}" == "x86" ] || [ "${{ matrix.arch }}" == "arm64" ]; then
            sudo wget -nv -O mikrotik.iso https://download.mikrotik.com/routeros/${{ env.LATEST_VERSION }}/mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}.iso
          else
            sudo wget -nv -O routeros.npk https://download.mikrotik.com/routeros/${{ env.LATEST_VERSION }}/routeros-${{ env.LATEST_VERSION }}${{ env.ARCH }}.npk
            sudo wget -nv -O routeros.zip https://download.mikrotik.com/routeros/${{ env.LATEST_VERSION }}/all_packages${{ env.ARCH }}-${{ env.LATEST_VERSION }}.zip
          fi

      - name: Patch firmware
        run: |
          # Lógica de patching y firma de firmware
          echo "Aquí van todos los pasos de patching tal como tu workflow original..."

      # ---------------------------
      # RELEASE
      # ---------------------------
      - name: Delete existing release/tag
        run: |
          HEADER="Authorization: token ${{ secrets.GITHUB_TOKEN }}"
          TAG="${{ env.LATEST_VERSION }}${{ env.ARCH }}"
          RELEASE_INFO=$(curl -s -H "$HEADER" https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG)
          RELEASE_ID=$(echo $RELEASE_INFO | jq -r '.id')
          if [ "$RELEASE_ID" != "null" ]; then
            echo "Deleting previous release $TAG"
            curl -X DELETE -H "$HEADER" https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$TAG
            curl -X DELETE -H "$HEADER" https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RouterOS ${{ env.LATEST_VERSION }} ${{ matrix.arch }}"
          body_path: "CHANGELOG"
          tag_name: ${{ env.LATEST_VERSION }}${{ env.ARCH }}
          prerelease: ${{ matrix.channel == 'testing' }}
          files: |
            mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}.iso
            netinstall-${{ env.LATEST_VERSION }}.zip
            routeros-${{ env.LATEST_VERSION }}${{ env.ARCH }}.npk
            all_packages-*-${{ env.LATEST_VERSION }}.zip
            *.EFI
